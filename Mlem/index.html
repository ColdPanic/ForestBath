<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>mlem — phone.lock</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #06080f;
      --device:      #0b0e1a;
      --panel:       #0f1220;
      --border:      #1c2845;
      --accent:      #1d7afd;
      --accent-glow: #5299ff;
      --accent-dim:  #061530;
      --red:         #c0392b;
      --red-glow:    #ff4444;
      --green:       #1e7a3c;
      --green-glow:  #2ecc71;
      --text:        #b8c8e8;
      --text-dim:    #2e3f60;
      --text-bright: #dde8ff;
      --font-mono:   'Courier New', Courier, monospace;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-mono);
      overflow: hidden;
    }

    /* ── Version stamp ── */
    .version-stamp {
      position: fixed;
      bottom: 8px;
      right: 10px;
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 0.08em;
      color: var(--text-dim);
      opacity: 0.5;
      pointer-events: none;
      z-index: 10000;
    }

    /* ── Scanline overlay ── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.06) 2px,
        rgba(0,0,0,0.06) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    /* ── Device shell ── */
    .device {
      width: min(380px, 96vw);
      background: var(--device);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 20px 20px 28px;
      box-shadow:
        0 0 0 1px #080c18,
        0 24px 64px rgba(0,0,30,0.85),
        inset 0 1px 0 rgba(100,140,255,0.06);
      position: relative;
      user-select: none;
    }

    /* ── Phone status bar ── */
    .phone-status {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 8px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 14px;
      padding: 0 2px;
    }

    /* ── Layer badge ── */
    .stage-badge {
      text-align: center;
      font-size: 11px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--accent);
      text-shadow: 0 0 8px rgba(29,122,253,0.4);
      margin-bottom: 12px;
    }

    /* ── Display screen ── */
    .display {
      background: #050710;
      border: 1px solid #111a30;
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 18px;
      min-height: 64px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      position: relative;
      box-shadow: inset 0 2px 10px rgba(0,0,0,0.7);
    }

    .display::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 8px;
      background: linear-gradient(180deg, rgba(100,140,255,0.03) 0%, transparent 50%);
      pointer-events: none;
    }

    .display-status {
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-dim);
      transition: color 0.2s;
    }

    .display-main {
      font-size: 15px;
      letter-spacing: 0.1em;
      color: var(--accent);
      text-shadow: 0 0 10px rgba(29,122,253,0.5);
      text-transform: uppercase;
      transition: color 0.2s, text-shadow 0.2s;
    }

    .display-main.red  { color: var(--red-glow);  text-shadow: 0 0 10px var(--red); }
    .display-main.green{ color: var(--green-glow); text-shadow: 0 0 10px var(--green); }

    /* ── Progress dots ── */
    .progress-bar {
      display: flex;
      gap: 5px;
      margin-bottom: 16px;
      justify-content: center;
      min-height: 11px;
    }

    .progress-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--border);
      transition: background 0.25s, box-shadow 0.25s;
    }

    .progress-dot.done {
      background: var(--accent);
      box-shadow: 0 0 5px var(--accent);
    }

    .progress-dot.current {
      background: var(--accent-glow);
      box-shadow: 0 0 8px var(--accent-glow);
      animation: pulse-dot 1s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { box-shadow: 0 0 5px var(--accent-glow); }
      50%       { box-shadow: 0 0 14px var(--accent-glow); }
    }

    /* ── Button grid ── */
    .btn-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 18px;
    }

    .safe-btn {
      aspect-ratio: 1;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      cursor: pointer;
      position: relative;
      transition: opacity 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow:
        inset 0 1px 0 rgba(100,140,255,0.04),
        0 2px 8px rgba(0,0,0,0.5);
    }

    .safe-btn.inactive {
      opacity: 0.1;
      cursor: default;
      pointer-events: none;
    }

    .safe-btn .btn-num {
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: bold;
      color: var(--text-dim);
      transition: color 0.15s;
      z-index: 1;
    }

    .safe-btn .btn-shape {
      width: 52%;
      height: 52%;
      fill: var(--text-dim);
      z-index: 1;
      position: relative;
      overflow: visible;
      transition: fill 0.12s, filter 0.12s;
    }

    .safe-btn .btn-glow {
      position: absolute;
      inset: 0;
      border-radius: 11px;
      background: radial-gradient(circle at center, var(--accent-dim), transparent 70%);
      opacity: 0;
      transition: opacity 0.12s;
    }

    /* error flash */
    .safe-btn.error {
      border-color: var(--red-glow);
      background: #1a0500;
      box-shadow: 0 0 14px rgba(192,57,43,0.45);
    }
    .safe-btn.error .btn-num   { color: var(--red-glow); text-shadow: 0 0 6px var(--red); }
    .safe-btn.error .btn-shape { fill: var(--red-glow); filter: drop-shadow(0 0 4px rgba(255,68,68,0.7)); }
    .safe-btn.error .btn-glow  { opacity: 1; background: radial-gradient(circle at center, rgba(192,57,43,0.25), transparent 70%); }

    /* confirmed correct */
    .safe-btn.success {
      border-color: var(--green-glow);
      background: #001a07;
      box-shadow: 0 0 14px rgba(30,122,60,0.5);
    }
    .safe-btn.success .btn-num   { color: var(--green-glow); text-shadow: 0 0 6px var(--green); }
    .safe-btn.success .btn-shape { fill: var(--green-glow); filter: drop-shadow(0 0 4px rgba(46,204,113,0.6)); }
    .safe-btn.success .btn-glow  { opacity: 1; background: radial-gradient(circle at center, rgba(30,122,60,0.2), transparent 70%); }

    .safe-btn:disabled:not(.inactive):not(.success) { cursor: default; }

    /* ── Center tile padlock animation ── */
    .safe-btn.lock-anim {
      opacity: 1 !important;
      pointer-events: none;
      cursor: default;
      border-color: #1d7afd;
      background: #061530;
      animation: lock-btn-flash 0.85s ease forwards;
    }
    @keyframes lock-btn-flash {
      0%   { border-color: #1d7afd; background: #061530; box-shadow: 0 0 12px rgba(29,122,253,0.4); }
      55%  { border-color: #2ecc71; background: #001a07; box-shadow: 0 0 22px rgba(46,204,113,0.55); }
      100% { border-color: #2ecc71; background: #001a07; box-shadow: 0 0 16px rgba(46,204,113,0.4); }
    }

    .lock-svg {
      width: 56%; height: 56%;
      overflow: visible;
      z-index: 1;
      position: relative;
    }
    .lock-body {
      fill: #1d7afd;
      animation: lock-body-color 0.85s ease forwards;
    }
    @keyframes lock-body-color {
      0%   { fill: #1d7afd; }
      55%  { fill: #2ecc71; }
      100% { fill: #2ecc71; }
    }
    .lock-hole {
      fill: #06080f;
      animation: lock-hole-bg 0.85s ease forwards;
    }
    @keyframes lock-hole-bg {
      0%   { fill: #06080f; }
      55%  { fill: #001a07; }
      100% { fill: #001a07; }
    }
    .lock-shackle {
      fill: none;
      stroke: #1d7afd;
      stroke-width: 2.5;
      stroke-linecap: round;
      transform-box: fill-box;
      transform-origin: right bottom;
      animation: shackle-open 0.85s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
    @keyframes shackle-open {
      /* phase 1: shackle lifts straight up out of the body */
      0%   { transform: translateY(0)    rotate(0deg);    stroke: #1d7afd; }
      25%  { transform: translateY(-3px) rotate(0deg);    stroke: #1d7afd; }
      /* phase 2: swing open (left leg arcs upward, right leg stays anchored) */
      65%  { transform: translateY(-3px) rotate(-50deg);  stroke: #2ecc71; }
      80%  { transform: translateY(-3px) rotate(-44deg); }
      100% { transform: translateY(-3px) rotate(-47deg);  stroke: #2ecc71; }
    }

    /* ── Win overlay ── */
    .win-overlay {
      display: none;
      position: absolute;
      inset: 0;
      border-radius: 23px;
      background: rgba(0,0,0,0.9);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      z-index: 10;
    }
    .win-overlay.show { display: flex; }

    .win-icon {
      font-size: 40px;
      animation: win-pop 0.4s cubic-bezier(0.34,1.56,0.64,1) both, unlock-spin 0.8s 0.3s ease both;
    }

    .win-title {
      font-size: 16px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--green-glow);
      text-shadow: 0 0 16px var(--green);
      animation: win-glow 1.8s ease-in-out infinite alternate;
    }

    .win-sub {
      font-size: 10px;
      letter-spacing: 0.12em;
      color: var(--text-dim);
      text-transform: uppercase;
      text-align: center;
      padding: 0 20px;
    }

    .win-replay {
      margin-top: 8px;
      padding: 8px 28px;
      background: transparent;
      border: 1px solid var(--green);
      border-radius: 6px;
      color: var(--green-glow);
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.15s;
    }
    .win-replay:hover { background: rgba(46,204,113,0.1); }

    @keyframes win-pop {
      0%   { transform: scale(0); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    @keyframes win-glow {
      from { text-shadow: 0 0 8px var(--green); }
      to   { text-shadow: 0 0 24px var(--green), 0 0 40px rgba(46,204,113,0.3); }
    }

    @keyframes unlock-spin {
      0%   { transform: rotate(-20deg); }
      30%  { transform: rotate(15deg); }
      60%  { transform: rotate(-8deg); }
      80%  { transform: rotate(5deg); }
      100% { transform: rotate(0deg); }
    }

    .device.win-state {
      animation: border-win 1.5s ease-in-out 3;
    }
    @keyframes border-win {
      0%, 100% { border-color: var(--border); box-shadow: 0 0 0 1px #080c18, 0 24px 64px rgba(0,0,30,0.85); }
      50%       { border-color: var(--green);  box-shadow: 0 0 0 1px #080c18, 0 24px 64px rgba(0,0,30,0.85), 0 0 30px rgba(46,204,113,0.15); }
    }

    /* ── Intro screen ── */
    .intro-overlay {
      position: absolute;
      inset: 0;
      border-radius: 23px;
      background: var(--device);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      z-index: 10;
    }
    .intro-overlay.hidden { display: none; }

    .intro-title {
      font-size: 20px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      text-shadow: 0 0 16px rgba(29,122,253,0.5);
    }

    .intro-label {
      font-size: 9px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .intro-start {
      margin-top: 6px;
      padding: 9px 30px;
      background: transparent;
      border: 1px solid var(--accent-dim);
      border-radius: 6px;
      color: var(--accent);
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .intro-start:hover {
      background: rgba(29,122,253,0.08);
      border-color: var(--accent);
    }
  </style>
</head>
<body>

<div class="version-stamp">v1.3 · 2026-03-29</div>

<div class="device" id="device">

  <!-- Intro overlay -->
  <div class="intro-overlay" id="intro">
    <div class="intro-label">nexus security systems</div>
    <div class="intro-title">phone.lock</div>
    <div class="intro-label">multi-layer authentication</div>
    <button class="intro-start" id="intro-start-btn">begin unlock</button>
  </div>

  <!-- Win overlay -->
  <div class="win-overlay" id="win-overlay">
    <div class="win-icon">🔓</div>
    <div class="win-title">device unlocked</div>
    <div class="win-sub">all layers cleared · identity confirmed</div>
    <button class="win-replay" id="win-replay-btn">lock device</button>
  </div>

  <div class="phone-status">
    <span>nexus</span>
    <span>▪ locked ▪</span>
    <span>s7</span>
  </div>

  <div class="stage-badge" id="stage-badge">layer 1</div>

  <div class="display">
    <div class="display-status" id="status-label">awaiting input</div>
    <div class="display-main" id="main-label">—</div>
  </div>

  <div class="progress-bar" id="progress-bar"></div>

  <div class="btn-grid" id="btn-grid"></div>

</div>

<script>
  // ── Layer configuration ──────────────────────────
  // buttons:   grid indices (0-8) active for this layer
  // shapeMode: undefined = number labels
  //            'groups'  = 3 shapes × 3 buttons each (square/circle/triangle)
  //            'unique'  = 9 fully distinct shapes
  //
  //   Grid layout:  0 1 2
  //                 3 4 5
  //                 6 7 8
  //
  const STAGES = [
    { buttons: [4] },                             // layer 1 — center
    { buttons: [3, 5] },                          // layer 2 — L/R flanks
    { buttons: [1, 4, 7] },                       // layer 3 — vertical strip
    { buttons: [0, 2, 6, 8] },                    // layer 4 — four corners
    { buttons: [0, 1, 2, 3, 5, 6, 7, 8] },         // layer 5 — outer ring (numbered)
    { buttons: [0, 1, 2, 3, 5, 6, 7, 8], shapeMode: 'groups'  }, // layer 6 — 3 shape groups
    { buttons: [0, 1, 2, 3, 5, 6, 7, 8], shapeMode: 'unique'  }, // layer 7 — 8 unique shapes
  ];

  // ── Shape SVG definitions (24×24 viewBox) ────────
  const SHAPES = {
    square:   `<rect x="5" y="5" width="14" height="14"/>`,
    circle:   `<circle cx="12" cy="12" r="7"/>`,
    triangle: `<polygon points="12,4 21,20 3,20"/>`,
    diamond:  `<polygon points="12,3 21,12 12,21 3,12"/>`,
    pentagon: `<polygon points="12,4 19.6,9.5 16.7,18.5 7.3,18.5 4.4,9.5"/>`,
    hexagon:  `<polygon points="12,4 19,8 19,16 12,20 5,16 5,8"/>`,
    star:     `<polygon points="12,3 14.2,8.9 20.6,9.2 15.6,13.2 17.3,19.3 12,15.8 6.7,19.3 8.4,13.2 3.4,9.2 9.8,8.9"/>`,
    cross:    `<path d="M9,4 h6 v5 h5 v6 h-5 v5 h-6 v-5 h-5 v-6 h5 z"/>`,
    heart:    `<path d="M12,20 C12,20 3,13 3,8 C3,5 5.5,3 8,3 C10,3 11.5,4.5 12,5.5 C12.5,4.5 14,3 16,3 C18.5,3 21,5 21,8 C21,13 12,20 12,20Z"/>`,
  };

  const GROUP_SHAPES  = ['square', 'circle', 'triangle',
                         'square', 'circle', 'triangle',
                         'square', 'circle'];
  const UNIQUE_SHAPES = ['square', 'circle', 'triangle', 'diamond',
                         'pentagon', 'hexagon', 'star', 'cross'];

  const ERROR_FLASH_MS = 150;
  const STAGE_CLEAR_MS = 900;
  const TOTAL_BUTTONS  = 9;

  let sequence     = [];
  let playerPos    = 0;
  let stageIdx     = 0;
  let phase        = 'idle';
  let buttonShapes = [];

  const deviceEl    = document.getElementById('device');
  const introEl     = document.getElementById('intro');
  const winEl       = document.getElementById('win-overlay');
  const stageBadge  = document.getElementById('stage-badge');
  const statusLabel = document.getElementById('status-label');
  const mainLabel   = document.getElementById('main-label');
  const progressBar = document.getElementById('progress-bar');
  const btnGrid     = document.getElementById('btn-grid');

  // ── Build static 3×3 grid ────────────────────────
  const btns = [];
  for (let i = 0; i < TOTAL_BUTTONS; i++) {
    const b = document.createElement('button');
    b.className = 'safe-btn inactive';
    b.disabled = true;
    b.innerHTML = `<div class="btn-glow"></div><span class="btn-num">${i + 1}</span>`;
    b.addEventListener('click', () => handlePress(i));
    btnGrid.appendChild(b);
    btns.push(b);
  }

  // ── Helpers ──────────────────────────────────────
  function setDisplay(status, main, cls = '') {
    statusLabel.textContent = status;
    mainLabel.textContent   = main;
    mainLabel.className     = 'display-main' + (cls ? ' ' + cls : '');
  }

  function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

  function shuffleArray(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  // ── Progress dots (rebuilt per layer) ────────────
  let dots = [];
  function buildDots(count) {
    progressBar.innerHTML = '';
    dots = [];
    for (let i = 0; i < count; i++) {
      const d = document.createElement('div');
      d.className = 'progress-dot';
      progressBar.appendChild(d);
      dots.push(d);
    }
  }

  function updateProgress() {
    dots.forEach((d, i) => {
      d.classList.remove('done', 'current');
      if (i < playerPos) d.classList.add('done');
      else if (i === playerPos) d.classList.add('current');
    });
  }

  // ── Sequence: shuffle of active button indices ───
  function generateSequence(activeButtons) {
    sequence = shuffleArray([...activeButtons]);
  }

  // ── Shape assignment ──────────────────────────────
  function assignShapes(mode) {
    buttonShapes = shuffleArray(
      mode === 'groups' ? [...GROUP_SHAPES] : [...UNIQUE_SHAPES]
    );
  }

  function shapeToSVG(name) {
    return `<svg class="btn-shape" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">${SHAPES[name]}</svg>`;
  }

  // ── Apply layer layout ────────────────────────────
  function applyStageLayout(idx) {
    const { buttons, shapeMode } = STAGES[idx];
    if (shapeMode) assignShapes(shapeMode);
    stageBadge.textContent = `layer ${idx + 1}`;
    btns.forEach((b, i) => {
      const active = buttons.includes(i);
      b.classList.remove('success', 'error', 'lock-anim');
      b.classList.toggle('inactive', !active);
      b.disabled = !active;
      b.innerHTML = shapeMode
        ? `<div class="btn-glow"></div>${shapeToSVG(buttonShapes[i])}`
        : `<div class="btn-glow"></div><span class="btn-num">${i + 1}</span>`;
    });
    buildDots(buttons.length);
  }

  // ── Handle player button press ───────────────────
  async function handlePress(idx) {
    if (phase !== 'input') return;
    phase = 'animating';

    if (idx === sequence[playerPos]) {
      btns[idx].classList.add('success');
      btns[idx].disabled = true;
      playerPos++;
      updateProgress();

      if (playerPos === sequence.length) {
        await stageClear();
      } else {
        setDisplay('confirmed', `step ${playerPos + 1} of ${sequence.length}`);
        phase = 'input';
      }
    } else {
      const active = STAGES[stageIdx].buttons;
      setDisplay('access denied', 'wrong input', 'red');
      active.forEach(i => {
        btns[i].classList.remove('success');
        btns[i].classList.add('error');
      });
      await sleep(ERROR_FLASH_MS);
      active.forEach(i => {
        btns[i].classList.remove('error');
        btns[i].disabled = false;
      });
      playerPos = 0;
      updateProgress();
      setDisplay('tap sequence', `step 1 of ${sequence.length}`);
      phase = 'input';
    }
  }

  // ── Center tile padlock unlock animation ─────────
  function showLockAnimation() {
    const b = btns[4];
    b.classList.remove('inactive', 'success', 'error', 'lock-anim');
    // Force reflow so re-adding the class restarts the animation
    void b.offsetWidth;
    b.classList.add('lock-anim');
    b.innerHTML = `
      <div class="btn-glow"></div>
      <svg class="lock-svg" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <rect class="lock-body" x="3" y="11" width="18" height="12" rx="2"/>
        <circle class="lock-hole" cx="12" cy="17" r="1.5"/>
        <path class="lock-shackle" d="M8,11 L8,7 A4,4 0 0,1 16,7 L16,11"/>
      </svg>`;
  }

  // ── Layer clear ───────────────────────────────────
  async function stageClear() {
    phase = 'transition';
    setDisplay(`layer ${stageIdx + 1} cleared`, 'auth passed', 'green');
    showLockAnimation();
    await sleep(STAGE_CLEAR_MS);

    if (stageIdx === STAGES.length - 1) {
      showWin();
    } else {
      stageIdx++;
      startStage();
    }
  }

  // ── Start a layer ─────────────────────────────────
  function startStage() {
    applyStageLayout(stageIdx);
    generateSequence(STAGES[stageIdx].buttons);
    playerPos = 0;
    updateProgress();
    setDisplay('tap sequence', `step 1 of ${sequence.length}`);
    phase = 'input';
  }

  // ── Final win ─────────────────────────────────────
  function showWin() {
    phase = 'idle';
    btns.forEach(b => { b.disabled = true; });
    deviceEl.classList.add('win-state');
    winEl.classList.add('show');
    setDisplay('identity confirmed', 'device unlocked', 'green');
  }

  // ── Start / restart ───────────────────────────────
  function startGame() {
    deviceEl.classList.remove('win-state');
    winEl.classList.remove('show');
    introEl.classList.add('hidden');
    stageIdx = 0;
    startStage();
  }

  document.getElementById('intro-start-btn').addEventListener('click', startGame);
  document.getElementById('win-replay-btn').addEventListener('click', startGame);
</script>

</body>
</html>
